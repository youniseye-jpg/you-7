<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فيديو يوتيوب</title>

<style>
body{
  margin:0;
  font-family:Tahoma;
  background: linear-gradient(135deg,#0f3d91,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.video-box{
  width:90%;
  max-width:800px;
  aspect-ratio:16/9;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  border-radius:20px;
  overflow:hidden;
}
iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>

</head>

<body>

<div class="video-box">
  <iframe 
    src="https://www.youtube.com/embed/ysz5S6PUM-U"
    title="YouTube video player"
    allowfullscreen>
  </iframe>
</div>

</body>
</html>
